<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cathay Innovation CRM — Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e0e0e0;
  }

  h1 {
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8ab4f8;
    margin-bottom: 18px;
    opacity: 0.8;
  }

  /* ── Conteneur principal de ecran1 ── */
  .screen-wrapper {
    position: relative;
    display: inline-block;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.7);
  }

  .screen-wrapper img {
    display: block;
    max-width: 900px;
    width: 100%;
    height: auto;
  }

  /* ── Zone cliquable superposée sur "New Note" ── */
  .hotspot {
    position: absolute;
    /* Coordonnées calées sur "New Note" dans ecran1 : ~68%→96% x, ~59%→76% y */
    left: 67.5%;
    top:  57%;
    width: 29%;
    height: 17%;

    border-radius: 6px;
    border: 2px solid rgba(255, 200, 0, 0.0);
    cursor: pointer;
    transition: background 0.2s;

    /* Halo pulsant */
    animation: pulse-ring 1.4s ease-in-out infinite;
  }

  .hotspot:hover {
    background: rgba(255, 220, 50, 0.15);
    border-color: rgba(255, 220, 50, 0.8);
    animation: none;
  }

  /* Indicateur visuel clignotant dans le coin */
  .hotspot::after {
    content: '▶ cliquez';
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #ffd700;
    white-space: nowrap;
    letter-spacing: 1px;
    animation: blink-text 1.4s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0   rgba(255, 215, 0, 0.7);
           border-color: rgba(255, 215, 0, 0.7); }
    50%  { box-shadow: 0 0 0 8px rgba(255, 215, 0, 0.0);
           border-color: rgba(255, 215, 0, 1.0); }
    100% { box-shadow: 0 0 0 0   rgba(255, 215, 0, 0.7);
           border-color: rgba(255, 215, 0, 0.7); }
  }

  @keyframes blink-text {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  /* ── Modal overlay ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    animation: fade-in 0.25s ease;
  }

  .modal-overlay.visible {
    display: flex;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .modal-box {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.9);
    animation: slide-up 0.25s ease;
  }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-box img {
    display: block;
    max-width: 680px;
    width: 90vw;
    height: auto;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 16px;
    line-height: 30px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
    z-index: 10;
  }

  .modal-close:hover { background: rgba(220, 50, 50, 0.8); }

  .hint {
    margin-top: 28px;
    font-size: 12px;
    color: #555;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1>Cathay Innovation CRM — Account View</h1>

<!-- ── Écran 1 avec zone cliquable ── -->
<div class="screen-wrapper">
  <img src="ecran1.png" alt="Account screen">

  <!-- Zone superposée sur "New Note" (première occurrence) -->
  <div class="hotspot" onclick="openNote()" title="Ouvrir New Note"></div>
</div>

<p class="hint">Cliquez sur le bloc « New Note » pour ouvrir la fiche</p>

<!-- ── Modal : Écran 2 ── -->
<div class="modal-overlay" id="noteModal" onclick="closeIfOutside(event)">
  <div class="modal-box">
    <span class="modal-close" onclick="closeNote()" title="Fermer">&times;</span>
    <img src="ecran2.png" alt="Note detail">
  </div>
</div>

<script>
  function openNote() {
    document.getElementById('noteModal').classList.add('visible');
  }

  function closeNote() {
    document.getElementById('noteModal').classList.remove('visible');
  }

  function closeIfOutside(e) {
    if (e.target === document.getElementById('noteModal')) closeNote();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeNote();
  });
</script>

</body>
</html>
