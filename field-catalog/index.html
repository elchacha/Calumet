<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Calumet Field Catalog</title>
<style>
  :root{
    --bg:#f1f5f9; --panel:#ffffff; --border:#e2e8f0; --ink:#1e293b; --muted:#64748b;
    --blue:#2563eb; --green:#16a34a; --amber:#f59e0b; --red:#dc2626; --purple:#7c3aed; --grey:#94a3b8;
  }
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.4 "Segoe UI",Arial,sans-serif;color:var(--ink);background:var(--bg);height:100vh;display:flex;flex-direction:column}
  header{background:#0f172a;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:16px}
  header h1{font-size:16px;margin:0;font-weight:600}
  header .meta{color:#94a3b8;font-size:12px}
  header label.load{margin-left:auto;background:var(--blue);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
  header input[type=file]{display:none}
  #main{flex:1;display:flex;min-height:0}
  #sidebar{width:300px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column}
  #sidebar .search{padding:8px}
  #sidebar input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px}
  .objsort{display:flex;gap:4px;margin-top:6px}
  .sbtn{flex:1;text-align:center;padding:3px 0;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px;color:#475569;background:#fff}
  .sbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .reccount{font-weight:700;color:var(--red)}
  #objlist{overflow:auto;flex:1}
  .objitem{padding:7px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer}
  .objitem:hover{background:#f8fafc}
  .objitem.sel{background:#eff6ff;border-left:3px solid var(--blue)}
  .objitem .nm{font-weight:600}
  .objitem .sub{color:var(--muted);font-size:11px}
  #content{flex:1;overflow:auto;padding:14px 18px}
  .empty{color:var(--muted);text-align:center;margin-top:80px}
  .ohead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .ohead h2{margin:0;font-size:18px}
  .ohead .api{color:var(--muted);font-family:monospace}
  .rel{margin:6px 0 10px;font-size:12px;color:var(--muted)}
  .chip{display:inline-block;padding:1px 7px;border-radius:10px;background:#eef2ff;color:#3730a3;margin:2px;cursor:pointer;font-size:11px}
  .chip.ro{cursor:default;background:#f1f5f9;color:#475569}
  .objcard{background:linear-gradient(135deg,#ffffff,#eef2f7);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:10px;padding:10px 14px 9px;margin-bottom:10px;box-shadow:0 1px 4px rgba(15,23,42,.08)}
  .objcard .ohead{margin-bottom:6px}
  .objcard h2{font-size:20px;color:#0f172a;font-weight:700}
  .stat{display:inline-block;padding:2px 10px;border-radius:8px;background:#fff;border:1px solid var(--border);font-size:12px;color:#475569}
  .stat b{color:#0f172a;font-variant-numeric:tabular-nums}
  .stat.rec b{color:var(--red)}
  .rtchip{display:inline-block;padding:2px 9px;border-radius:8px;background:#fff;border:1px solid #cbd5e1;color:#334155;font-size:11px;margin:2px 2px 0 0;box-shadow:0 1px 1px rgba(15,23,42,.05)}
  .rtlabel{font-weight:600;color:#475569;font-size:11px;text-transform:uppercase;letter-spacing:.03em;margin-right:4px}
  .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}
  .filters input[type=text]{padding:6px 8px;border:1px solid var(--border);border-radius:6px;min-width:220px}
  .ftog{padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:11px;color:#475569}
  .ftog.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .toggle{display:inline-block;width:34px;height:18px;background:#cbd5e1;border-radius:9px;position:relative;cursor:pointer;vertical-align:middle;transition:background .15s}
  .toggle.on{background:var(--blue)}
  .toggle .knob{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .toggle.on .knob{left:18px}
  .tg-label{font-size:11px;color:#94a3b8;cursor:pointer;vertical-align:middle}
  .tg-label.act{color:var(--ink);font-weight:600}
  table{width:100%;border-collapse:collapse;background:var(--panel)}
  th,td{padding:5px 8px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
  th{position:sticky;top:0;background:#f8fafc;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);white-space:nowrap}
  th.num{text-align:right}
  th:hover{color:var(--ink)}
  tr.frow:hover{background:#f8fafc}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:1px 7px;border-radius:4px;color:#fff;font-size:10px;font-weight:600;margin-right:3px}
  .ttype{background:var(--blue)} .tmanaged{background:var(--grey)}
  .bar{display:inline-block;height:10px;border-radius:3px;vertical-align:middle}
  .flag{display:inline-block;padding:0 6px;border-radius:8px;font-size:10px;margin:1px;background:#f1f5f9;color:#475569}
  .flag.unused{background:#fee2e2;color:#991b1b}.flag.lowFill{background:#ffedd5;color:#9a3412}
  .flag.managed{background:#e5e7eb;color:#374151}.flag.formula{background:#ede9fe;color:#5b21b6}
  .flag.required{background:#dcfce7;color:#166534}.flag.externalId{background:#dbeafe;color:#1e40af}
  .detail{background:#f8fafc;font-size:12px;padding:8px 12px}
  .detail b{color:#334155}
  .pv{display:inline-block;margin:2px 6px 2px 0}
  .pv .o{color:var(--red);font-weight:600}
  .expand{cursor:pointer;color:var(--blue);user-select:none}
  .reftype{font-size:10px;background:#eef2ff;color:#3730a3;padding:0 5px;border-radius:6px;margin-right:3px}
  #refpop{position:fixed;display:none;z-index:50;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:8px 10px;max-width:460px;max-height:360px;overflow:auto;font-size:12px}
  #refpop .rhead{margin-bottom:5px;color:#334155}
  #refpop .rpin{color:#94a3b8;font-weight:normal;font-size:10px;margin-left:6px}
  #refpop .rbt{margin-bottom:6px}
  #refpop .rcomp{padding:1px 0;white-space:nowrap}
  #refpop .rmore{color:#94a3b8;margin-top:4px}
  .help{display:inline-block;width:14px;height:14px;line-height:14px;text-align:center;border-radius:50%;background:#cbd5e1;color:#334155;font-size:10px;cursor:help;margin-left:5px;vertical-align:middle}
  #helppop{position:fixed;display:none;z-index:60;background:#0f172a;color:#e2e8f0;border-radius:8px;padding:10px 12px;max-width:360px;font-size:11px;line-height:1.55;box-shadow:0 8px 24px rgba(0,0,0,.28)}
  #helppop b{color:#fff}
  #helppop code{background:#1e293b;padding:0 4px;border-radius:3px}
</style>
</head>
<body>
<header>
  <h1>Calumet Field Catalog</h1>
  <span class="meta" id="hmeta">load a fieldCatalog folder to start</span>
  <label class="load">Load folder<input type="file" id="folder" webkitdirectory directory multiple/></label>
</header>
<div id="main">
  <aside id="sidebar">
    <div class="search">
      <input id="objsearch" type="text" placeholder="Filter objects..."/>
      <div class="objsort">
        <span class="sbtn on" data-s="name">A-Z</span>
        <span class="sbtn" data-s="records">Records</span>
      </div>
    </div>
    <div id="objlist"></div>
  </aside>
  <section id="content"><div class="empty">Pick the <code>fieldCatalog</code> folder<br/>(orgs/&lt;org&gt;/fieldCatalog)</div></section>
</div>
<div id="refpop"></div>
<div id="helppop"></div>

<script>
const DATA = {};          // apiName -> object json
let INDEX = null;
let current = null;       // selected object apiName
let sortKey = "apiName", sortDir = 1;
let objSort = "name";   // sidebar sort: "name" | "records"
const CATS = ["standard","managed","formula","required","externalId","unused","lowFill"];
const hiddenCats = new Set();   // unchecked categories
let filterMode = "hide";        // "hide" = uncheck hides that category ; "only" = show only checked categories
function matchesCat(f,cat){ return cat==="standard" ? !f.custom : (f.flags||[]).includes(cat); }

document.getElementById("folder").addEventListener("change", async e=>{
  const files = [...e.target.files].filter(f=>f.name.endsWith(".json"));
  for(const k in DATA) delete DATA[k];
  INDEX=null;
  await Promise.all(files.map(f=>f.text().then(t=>{
    try{
      const j=JSON.parse(t);
      if(f.name==="index.json"){ INDEX=j; }
      else if(j && j.object && j.object.apiName){ DATA[j.object.apiName]=j; }
    }catch(err){ console.warn("skip",f.name,err); }
  })));
  const names=Object.keys(DATA);
  document.getElementById("hmeta").textContent =
    (INDEX?INDEX.org+" - ":"")+names.length+" objects"+(INDEX&&INDEX.generatedAt?" - "+INDEX.generatedAt.slice(0,10):"");
  renderSidebar();
  if(names.length){ select(names.sort()[0]); }
});

document.getElementById("objsearch").addEventListener("input", renderSidebar);
document.querySelectorAll(".sbtn").forEach(b=>b.onclick=()=>{
  objSort=b.dataset.s;
  document.querySelectorAll(".sbtn").forEach(x=>x.classList.toggle("on",x.dataset.s===objSort));
  renderSidebar();
});

// Standalone mode : a generated catalog.html injects window.__CATALOG__ = {index, objects:[...]}.
function loadPayload(payload){
  for(const k in DATA) delete DATA[k];
  INDEX = payload.index || null;
  (payload.objects||[]).forEach(o=>{ if(o&&o.object&&o.object.apiName) DATA[o.object.apiName]=o; });
  const names=Object.keys(DATA);
  document.getElementById("hmeta").textContent=
    (INDEX?INDEX.org+" - ":"")+names.length+" objects"+(INDEX&&INDEX.generatedAt?" - "+INDEX.generatedAt.slice(0,10):"");
  renderSidebar();
  if(names.length) select(names.sort()[0]);
}
window.addEventListener("DOMContentLoaded",()=>{ if(window.__CATALOG__) loadPayload(window.__CATALOG__); });

function renderSidebar(){
  const q=document.getElementById("objsearch").value.toLowerCase();
  const list=document.getElementById("objlist");
  list.innerHTML="";
  Object.values(DATA)
    .filter(o=>!q || (o.object.apiName+" "+(o.object.label||"")).toLowerCase().includes(q))
    .sort((a,b)=> objSort==="records"
        ? ((b.object.recordCount||0)-(a.object.recordCount||0))
        : a.object.apiName.localeCompare(b.object.apiName))
    .forEach(o=>{
      const m=o.object;
      const d=document.createElement("div");
      d.className="objitem"+(current===m.apiName?" sel":"");
      d.innerHTML=`<div class="nm">${esc(m.label||m.apiName)}</div>
        <div class="sub">${esc(m.apiName)} - ${m.fieldCount} fields${m.recordCount!=null?' - <span class="reccount">'+fmt(m.recordCount)+'</span> rec':''}</div>`;
      d.onclick=()=>select(m.apiName);
      list.appendChild(d);
    });
}

function select(api){
  if(!DATA[api]) return;
  current=api; renderSidebar(); renderObject(DATA[api]);
}

function renderObject(o){
  const m=o.object, c=document.getElementById("content");
  c.innerHTML=`
    <div class="objcard">
      <div class="ohead"><h2>${esc(m.label||m.apiName)}</h2>
        <span class="api">${esc(m.apiName)}</span>
        <span class="chip ro">${m.custom?"custom":"standard"}</span>
        ${m.recordCount!=null?`<span class="stat rec"><b>${fmt(m.recordCount)}</b> records</span>`:""}
        <span class="stat"><b>${m.fieldCount}</b> fields</span></div>
      ${(m.recordTypes&&m.recordTypes.length)?`<div class="rel" style="margin:0"><span class="rtlabel">Record types</span>${m.recordTypes.map(r=>`<span class="rtchip">${esc(r)}</span>`).join("")}</div>`:""}
    </div>
    <div class="filters">
      <input id="fsearch" type="text" placeholder="Filter fields..."/>
      <span class="tg-label ${filterMode==='hide'?'act':''}" data-m="hide">Hide</span>
      <span id="modeToggle" class="toggle ${filterMode==='only'?'on':''}"><span class="knob"></span></span>
      <span class="tg-label ${filterMode==='only'?'act':''}" data-m="only">Only</span>
      ${CATS.map(c=>`<span class="ftog ${hiddenCats.has(c)?'':'on'}" data-f="${c}">${c}</span>`).join("")}
    </div>
    <table id="ftab"><thead><tr>
      ${th("apiName","Field")}${th("type","Type")}${th("_fill","Fill %","num")}${th("_refs","Refs","num")}
      ${th("keepScore","Score <span class='help'>?</span>","num")}<th>Flags</th>${th("createdDate","Created")}${th("_fls","FLS r/e","num")}
    </tr></thead><tbody id="fbody"></tbody></table>`;
  document.getElementById("fsearch").addEventListener("input",()=>renderRows(o));
  c.querySelectorAll(".ftog").forEach(t=>t.onclick=()=>{
    const f=t.dataset.f;
    if(hiddenCats.has(f)){hiddenCats.delete(f);t.classList.add("on");}     // re-checked
    else{hiddenCats.add(f);t.classList.remove("on");}                       // unchecked
    renderRows(o);
  });
  const setMode=m=>{
    filterMode=m;
    c.querySelector("#modeToggle").classList.toggle("on", m==='only');
    c.querySelectorAll(".tg-label").forEach(x=>x.classList.toggle("act", x.dataset.m===m));
    renderRows(o);
  };
  c.querySelector("#modeToggle").onclick=()=>setMode(filterMode==='only'?'hide':'only');
  c.querySelectorAll(".tg-label").forEach(l=>l.onclick=()=>setMode(l.dataset.m));
  c.querySelectorAll("th[data-k]").forEach(h=>h.onclick=()=>{
    const k=h.dataset.k; if(sortKey===k)sortDir=-sortDir; else{sortKey=k;sortDir=1;} renderRows(o);
  });
  const hp=c.querySelector(".help");
  if(hp){ hp.onmouseenter=()=>showHelp(hp); hp.onmouseleave=hideHelp; hp.onclick=e=>e.stopPropagation(); }
  renderRows(o);
}

function renderRows(o){
  const q=(document.getElementById("fsearch").value||"").toLowerCase();
  const body=document.getElementById("fbody");
  let rows=o.fields.filter(f=>{
    if(q && !((f.apiName+" "+(f.label||"")+" "+(f.description||"")).toLowerCase().includes(q))) return false;
    if(filterMode==="only"){
      // show only fields matching at least one CHECKED category (uncategorized fields hidden)
      let ok=false;
      for(const c of CATS){ if(!hiddenCats.has(c) && matchesCat(f,c)){ ok=true; break; } }
      if(!ok) return false;
    } else {
      // hide : drop fields matching any UNCHECKED category (uncategorized always shown)
      for(const cat of hiddenCats) if(matchesCat(f,cat)) return false;
    }
    return true;
  });
  rows.sort((a,b)=>cmp(val(a,sortKey),val(b,sortKey))*sortDir);
  body.innerHTML="";
  rows.forEach(f=>{
    const tr=document.createElement("tr"); tr.className="frow";
    const fillPct = f.fill? f.fill.percent : null;
    tr.innerHTML=`
      <td><b class="fieldname" style="cursor:pointer">${esc(f.apiName)}</b><div style="color:#64748b">${esc(f.label||"")}</div></td>
      <td><span class="pill ttype">${esc(f.type||"?")}</span>${f.managed?`<span class="pill tmanaged">${esc(f.namespace||"mgd")}</span>`:""}</td>
      <td class="num">${fillPct==null?'<span style="color:#cbd5e1">-</span>':fillBar(fillPct)}</td>
      <td class="num">${refsCell(f.references)}</td>
      <td class="num">${f.keepScore==null?"-":scoreCell(f.keepScore)}</td>
      <td>${(f.flags||[]).map(x=>`<span class="flag ${x}">${x}</span>`).join("")}</td>
      <td>${f.createdDate?esc(f.createdDate.slice(0,10)):'<span style="color:#cbd5e1">-</span>'}</td>
      <td class="num">${f.fls?f.fls.read+"/"+f.fls.edit:'<span style="color:#cbd5e1">-</span>'}</td>`;
    const fn=tr.querySelector(".fieldname");
    fn.onmouseenter=()=>showFieldPop(f,fn,false);
    fn.onmouseleave=scheduleHideRefPop;
    fn.onclick=e=>{e.stopPropagation();showFieldPop(f,fn,true);};
    const rc=tr.querySelector(".refclick");
    if(rc){
      rc.onmouseenter=()=>showRefPop(f,rc,false);
      rc.onmouseleave=scheduleHideRefPop;
      rc.onclick=e=>{e.stopPropagation();showRefPop(f,rc,true);};
    }
    body.appendChild(tr);
  });
}

function detail(f){
  let h="";
  if(f.description) h+=`<div><b>Description:</b> ${esc(f.description)}</div>`;
  if(f.helpText) h+=`<div><b>Help:</b> ${esc(f.helpText)}</div>`;
  if(f.formula) h+=`<div><b>Formula:</b> <code>${esc(f.formula)}</code></div>`;
  if(f.referenceTo&&f.referenceTo.length) h+=`<div><b>Lookup to:</b> ${f.referenceTo.map(r=>chip(r)).join("")}</div>`;
  if(f.picklistValues&&f.picklistValues.length){
    h+=`<div><b>Picklist:</b> ${f.picklistValues.map(p=>{
      const orphan=(f.orphanPicklistValues||[]).includes(p.value);
      return `<span class="pv ${orphan?'o':''}">${esc(p.value)}${p.usedCount!=null?" ("+p.usedCount+")":""}${p.defaultValue?" *":""}${!p.active?" [inactive]":""}</span>`;
    }).join("")}</div>`;
    if(f.orphanPicklistValues&&f.orphanPicklistValues.length) h+=`<div style="color:#b45309">Orphan values (active, never used): ${f.orphanPicklistValues.map(esc).join(", ")}</div>`;
  }
  if(f.fill&&f.fill.perRecordType&&Object.keys(f.fill.perRecordType).length){
    h+=`<div><b>Fill by RecordType:</b> ${Object.entries(f.fill.perRecordType).map(([k,v])=>`${esc(k)}: ${v}`).join(" - ")}</div>`;
  }
  return h||"<i>no extra detail</i>";
}

function val(f,k){
  if(k==="_fill") return f.fill?f.fill.percent:-1;
  if(k==="_refs") return f.references?f.references.total:0;
  if(k==="_fls") return f.fls?f.fls.read:-1;
  return f[k];
}
function cmp(a,b){ if(a==null)a=""; if(b==null)b=""; if(typeof a==="number"&&typeof b==="number")return a-b; return (""+a).localeCompare(""+b); }
function th(k,label,cls){return `<th data-k="${k}" class="${cls||''}">${label}</th>`;}
function refsCell(r){ if(!r||!r.total) return '<span style="color:#cbd5e1">0</span>'; return `<b class="refclick" style="color:#2563eb;cursor:pointer;text-decoration:underline">${r.total}</b>`; }
function fillBar(p){const col=p<5?"#dc2626":p<25?"#f59e0b":p<60?"#2563eb":"#16a34a";return `<span class="bar" style="width:${Math.max(3,p*0.5)}px;background:${col}"></span> ${p.toFixed(1)}`;}
function scoreCell(s){const col=s>=75?"#16a34a":s>=40?"#94a3b8":"#dc2626";return `<span style="color:${col};font-weight:600">${s}</span>`;}
function chip(api,via){const known=!!DATA[api];return `<span class="chip${known?'':' ro'}" ${known?`onclick="select('${api}')"`:""}>${esc(api)}${via?` <span style="opacity:.6">(${esc(via)})</span>`:""}</span>`;}
function fmt(n){return (n==null)?"":n.toLocaleString();}
function esc(s){return (s==null?"":""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// ---- references popup (hover to peek, click to pin) ----
let refPopTimer=null, refPopPinned=false;
function showPopHtml(html, anchor, pin){
  clearTimeout(refPopTimer);
  const pop=document.getElementById("refpop");
  pop.innerHTML=html;
  pop.style.display="block";
  const rect=anchor.getBoundingClientRect();
  let left=Math.min(rect.left, window.innerWidth-pop.offsetWidth-12);
  let top=rect.bottom+4;
  if(top+pop.offsetHeight>window.innerHeight) top=Math.max(8, rect.top-pop.offsetHeight-4);
  pop.style.left=Math.max(8,left)+"px"; pop.style.top=top+"px";
  refPopPinned=pin;
}
function showRefPop(f, anchor, pin){
  const r=f.references||{}; if(!r.total) return;
  const bt=Object.entries(r.byType||{}).map(([k,v])=>`<span class="reftype">${esc(k)}: ${v}</span>`).join(" ");
  const comps=(r.components||[]).map(c=>`<div class="rcomp"><span class="reftype">${esc(c.type||'?')}</span> ${esc(c.name||'')}</div>`).join("");
  const more=r.total>(r.components||[]).length?`<div class="rmore">+${r.total-(r.components||[]).length} more</div>`:"";
  showPopHtml(`<div class="rhead"><b>${esc(f.apiName)}</b> - referenced ${r.total}x`+(pin?'<span class="rpin">click outside to close</span>':'')+`</div><div class="rbt">${bt}</div>${comps}${more}`, anchor, pin);
}
function showFieldPop(f, anchor, pin){
  const head=`<div class="rhead"><b>${esc(f.apiName)}</b> <span class="reftype">${esc(f.type||'')}</span>`
    +(f.fill?` <span style="color:#64748b">fill ${f.fill.percent}%</span>`:"")
    +(pin?'<span class="rpin">click outside to close</span>':'')+`</div>`;
  showPopHtml(head+detail(f), anchor, pin);
}
function scheduleHideRefPop(){ if(refPopPinned) return; refPopTimer=setTimeout(()=>{document.getElementById("refpop").style.display="none";},250); }

// ---- score help tooltip ----
const SCORE_HELP=`<b>Keep score (0-100)</b> - higher = keep, lower = cleanup candidate.<br>`
 +`<code>100 - (0.6 x emptiness + 0.4 x noRefs)</code><br>`
 +`emptiness = 100 - fill% &nbsp; | &nbsp; noRefs = 100 if 0 references else 0<br><br>`
 +`So a field well filled <b>and</b> referenced scores ~100 (keep). An empty, never-referenced field scores ~0 (candidate). `
 +`Colours: <b style="color:#16a34a">&ge;75 keep</b>, 40-74 review, <b style="color:#dc2626">&lt;40 candidate</b>. Managed fields have no score.`;
function showHelp(anchor){
  const p=document.getElementById("helppop"); p.innerHTML=SCORE_HELP; p.style.display="block";
  const r=anchor.getBoundingClientRect();
  let left=Math.min(r.left, window.innerWidth-p.offsetWidth-12);
  let top=r.bottom+6; if(top+p.offsetHeight>window.innerHeight) top=Math.max(8,r.top-p.offsetHeight-6);
  p.style.left=Math.max(8,left)+"px"; p.style.top=top+"px";
}
function hideHelp(){ document.getElementById("helppop").style.display="none"; }
(function(){
  const pop=document.getElementById("refpop");
  pop.addEventListener("mouseenter",()=>clearTimeout(refPopTimer));
  pop.addEventListener("mouseleave",scheduleHideRefPop);
  document.addEventListener("click",e=>{
    if(refPopPinned && !pop.contains(e.target) && !e.target.classList.contains("refclick")){
      refPopPinned=false; pop.style.display="none";
    }
  });
})();
</script>
