<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>New Fields — Calumet</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>New Fields</h2>
    <span class="sum-badge">Tab 14</span>
  </div>
  <p class="sum-desc">List and analyse newly created custom fields across objects. Filter by creation date or user.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><input class="cal-tf" placeholder="Date..." readonly><span class="cal-lbl">Start date</span><button class="cal-btn btn-b">Extract</button><span class="cal-lbl">Extracted to</span><button class="cal-btn btn-d">Open</button><span class="cal-lbl">Select a date and launch extract. A file containing the new field created since the specified date will be calculated.</span><button class="cal-btn btn-d">export all fields</button></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
</body>
</html>
