<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile Comparison — Calumet</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>Profile Comparison</h2>
    <span class="sum-badge">Tab 51</span>
  </div>
  <p class="sum-desc">Compare two Salesforce profiles attribute by attribute to highlight permission differences.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><div class="tbl-wrap"><table class="cal-tbl"><thead><tr><th>Object</th><th>Name</th><th>Label</th><th>Type</th><th>Usage</th><th>Percent</th><th>CreatedDate</th><th>Created By</th><th>LastModifyDate</th><th>LastModifyBy</th><th>Id</th></tr></thead><tbody><tr><td colspan="20" class="tbl-empty"></td></tr></tbody></table></div><button class="cal-btn btn-b">Search</button><span class="cal-lbl">nbFields</span><input class="cal-tf" placeholder="" style="width:307.0px;" readonly><label class="cal-chk"><input type="checkbox" checked disabled> hide formulaFields</label></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
</body>
</html>
