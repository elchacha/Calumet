<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Set Helper — Calumet</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>Change Set Helper</h2>
    <span class="sum-badge">Tab 54</span>
  </div>
  <p class="sum-desc">Identify metadata members impacted by recent changes and build outbound change sets automatically.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><input class="cal-tf" placeholder="" style="width:375.0px;" readonly><div class="tbl-wrap"><table class="cal-tbl"><thead><tr><th>Custom</th><th>Type</th><th>Name</th><th>desc</th><th>modified</th><th>users</th><th>rights</th><th>ns</th><th>Children</th><th>In Group</th><th>Parents</th></tr></thead><tbody><tr><td colspan="20" class="tbl-empty"></td></tr></tbody></table></div><label class="cal-chk"><input type="checkbox" disabled> search content</label><label class="cal-chk"><input type="checkbox" disabled> search user</label><span class="cal-lbl">double click on a line to display the detail of the permission set / permission set group</span><label class="cal-chk"><input type="checkbox" checked disabled> hide standard permSet</label><label class="cal-chk"><input type="checkbox" disabled> hide managed permSet</label><label class="cal-chk"><input type="checkbox" disabled> search Strict content</label><div class="hbox" style="gap:10.0px;align-items:center"><button class="cal-btn btn-d">export</button><button class="cal-btn btn-b">update Cache</button><button class="cal-btn btn-b">Clear Cache</button></div></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
</body>
</html>
