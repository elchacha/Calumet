<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile List — Calumet</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>Profile List</h2>
    <span class="sum-badge">Tab 67</span>
  </div>
  <p class="sum-desc">List all profiles and permission sets with creation date, license type, and custom flag.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><button class="cal-btn btn-b">Extract</button><div class="tbl-wrap"><table class="cal-tbl"><thead><tr><th>Name</th><th>Created</th><th>CreatedBy</th><th>License</th><th>Custom</th><th>Active</th><th>Inactive</th></tr></thead><tbody><tr><td colspan="20" class="tbl-empty"></td></tr></tbody></table></div><label class="cal-chk"><input type="checkbox" checked disabled> Custom Only</label><label class="cal-chk"><input type="checkbox" checked disabled> No active users</label><span class="cal-lbl">default profile</span><button class="cal-btn btn-r" disabled>delete selected profiles</button></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
</body>
</html>
