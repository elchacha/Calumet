<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Org Comparison — Calumet</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>Org Comparison</h2>
    <span class="sum-badge">Tab 44</span>
  </div>
  <p class="sum-desc">Compare metadata between two connected orgs side-by-side to identify differences.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><button class="cal-btn btn-b">extract</button><div class="tbl-wrap"><table class="cal-tbl"><thead><tr><th>Active</th><th>ObjectName</th><th>Name</th><th>ActionType</th><th>ActionName</th><th>Action</th><th>Criterias</th><th>TriggerType</th><th>TimeBased</th></tr></thead><tbody><tr><td colspan="20" class="tbl-empty"></td></tr></tbody></table></div><input class="cal-tf" placeholder="" style="" readonly><button class="cal-btn btn-d">Export to xlsx</button><label class="cal-chk"><input type="checkbox" disabled> open File</label><label class="cal-chk"><input type="checkbox" disabled> update Cache</label></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
</body>
</html>
