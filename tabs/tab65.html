<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>App Assignments — Calumet</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>App Assignments</h2>
    <span class="sum-badge">Tab 65</span>
  </div>
  <p class="sum-desc">View which custom applications are assigned to each profile and permission set.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><button class="cal-btn btn-b">Extract</button><button class="cal-btn btn-d">Export to Excel</button><label class="cal-chk"><input type="checkbox" checked disabled> Hide empty columns</label><span class="cal-lbl">Filter:</span><input class="cal-tf" placeholder="filter on first column…" style="width:200.0px;" readonly><div class="tbl-wrap"><table class="cal-tbl"><thead><tr><th style="width:75.0px">C1</th><th style="width:75.0px">C2</th></tr></thead><tbody><tr><td colspan="20" class="tbl-empty"></td></tr></tbody></table></div></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
</body>
</html>
