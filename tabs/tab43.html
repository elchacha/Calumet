<!DOCTYPE html>
<html lang="en">
<head>

<title>List Views — Calumet</title>
<link rel="stylesheet" href="../shared.css">

<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>List Views</h2>
    <span class="sum-badge">Tab 43</span>
  </div>
  <p class="sum-desc">Browse and manage Salesforce List Views across objects. View sharing and filter criteria.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><button class="cal-btn btn-b">extract</button><div class="tbl-wrap"><table class="cal-tbl"><thead><tr><th>active</th><th>ObjectName</th><th>RecordName</th><th>Label</th><th>Created</th><th>CreatedBy</th><th>Number</th><th>Total</th><th>percent</th><th>Last Creation</th><th>Last Action</th><th>Description</th></tr></thead><tbody><tr><td colspan="20" class="tbl-empty"></td></tr></tbody></table></div><input class="cal-tf" placeholder="" style="" readonly><button class="cal-btn btn-d">Export to xlsx</button><label class="cal-chk"><input type="checkbox" disabled> open File</label><button class="cal-btn btn-d">Read</button><span class="cal-lbl">cacheDate</span></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
