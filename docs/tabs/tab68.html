<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile Search — Calumet</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>Profile Search</h2>
    <span class="sum-badge">Tab 68</span>
  </div>
  <p class="sum-desc">Search profiles and permission sets by name, license or custom flag. Filter active/inactive.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><button class="cal-btn btn-d">search</button><div class="tbl-wrap"><table class="cal-tbl"><thead><tr><th>Profile name</th><th>License</th><th>CreatedDate</th><th>custom</th><th>active</th><th>Target inactive</th></tr></thead><tbody><tr><td colspan="20" class="tbl-empty"></td></tr></tbody></table></div><label class="cal-chk"><input type="checkbox" disabled> Report</label><input class="cal-tf" placeholder="" style="width:201.0px;" readonly></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
</body>
</html>
