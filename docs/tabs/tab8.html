<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Retrieve All — Calumet</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body class="tab-page">
<div class="sum">
  <div class="sum-title">
    <h2>Retrieve All</h2>
    <span class="sum-badge">Tab 8</span>
  </div>
  <p class="sum-desc">Retrieve all metadata of one or more types from the org in bulk, useful for full org snapshots.</p>
</div>
<div class="mockup-wrap">
  <div class="mockup"><div class="vbox" style="gap:0px"><div class="anchor"><input class="cal-tf" placeholder="" style="width:316.0px;" readonly><span class="cal-lbl">ClassName :</span><button class="cal-btn btn-b">Search</button><div class="tbl-wrap"><table class="cal-tbl"><thead><tr><th style="width:300.0px">Name</th><th style="width:100.0px">Type</th><th style="width:50.0px">Add</th><th style="width:50.0px">Rem</th><th style="width:50.0px">Add</th><th style="width:50.0px">Rem</th></tr></thead><tbody><tr><td colspan="20" class="tbl-empty"></td></tr></tbody></table></div><button class="cal-btn btn-d">Retrieve</button><span class="cal-lbl">Manage using metadata</span><span class="cal-lbl">Manage used by metadata</span></div></div></div>
</div>
<script>
function sw(id,idx){
  var tp=document.getElementById(id);
  tp.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('act',i===idx)});
  tp.querySelectorAll('.m-panel').forEach(function(p,i){p.classList.toggle('act',i===idx)});
}
</script>
</body>
</html>
